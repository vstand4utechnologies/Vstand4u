<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Vstand4U</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0d1520; --card: #162032; --border: #1e3050; --accent: #f59e0b; --text: #f1f5f9; --muted: #7a90a8; --error: #ef4444; }

  * { cursor: none !important; }
  .cursor-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
  .cursor-ring { width: 32px; height: 32px; border: 2px solid rgba(245,158,11,0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: all 0.12s ease-out; }
  .cursor-ring.hover { width: 48px; height: 48px; background: rgba(245,158,11,0.08); border-color: var(--accent); }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    background-image: radial-gradient(ellipse at 50% 50%, rgba(245,158,11,0.05) 0%, transparent 60%); }
  .container { width: 100%; max-width: 400px; }
  .logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 2rem; letter-spacing: -0.02em; }
  .logo .v-u { color: #13a3ff; }
  .logo .stand { color: white; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.25rem; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
  .admin-badge { display: inline-block; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: var(--accent); font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
  h1 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 1.75rem; letter-spacing: -0.02em; }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
  input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem 1rem; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.25s, box-shadow 0.25s; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
  button {
    width: 100%; padding: 0.9rem; background: var(--accent);
    border: none; border-radius: 12px; color: #0a0f1e;
    font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800;
    letter-spacing: 0.02em; margin-top: 0.5rem;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden;
    box-shadow: 0 4px 20px rgba(245,158,11,0.3);
  }
  button:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 8px 30px rgba(245,158,11,0.45); }
  button:active { transform: scale(0.98); }
  .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.35); transform: scale(0); animation: ripple-anim 0.6s linear; pointer-events: none; }
  @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
  .msg { margin-top: 1rem; padding: 0.75rem; border-radius: 10px; font-size: 0.88rem; text-align: center; display: none; background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2); }

  footer{width:100%;text-align:center;padding:1.5rem 2rem;border-top:1px solid rgba(19,163,255,.08);margin-top:3rem}
  .footer-brand{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:900;letter-spacing:-.02em;margin-bottom:.6rem}
  .footer-brand .v-u{color:#13a3ff}.footer-brand .stand{color:white}
  .footer-info{display:flex;flex-wrap:wrap;justify-content:center;gap:.4rem 1rem;font-size:.76rem;color:#7a90a8;line-height:1.6}
  .footer-info a{color:#7a90a8;text-decoration:none}.footer-info a:hover{color:#13a3ff}
  .footer-sep{color:rgba(255,255,255,.1)}
  .footer-copy{margin-top:.6rem;font-size:.7rem;color:#2d4060}


  /* Page entry animation */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blobFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.03)}}
  .main,.page-content{animation:fadeInUp .5s ease both}
  nav{animation:fadeInUp .4s ease both}
  /* Animated background blobs */
  .bg-blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.09;pointer-events:none;z-index:0;animation:blobFloat 10s ease-in-out infinite}
  .bg-blob.b1{width:500px;height:500px;background:radial-gradient(circle,#13a3ff,transparent);top:-100px;right:-100px}
  .bg-blob.b2{width:400px;height:400px;background:radial-gradient(circle,#7c3aed,transparent);bottom:-100px;left:-100px;animation-delay:-5s}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(19,163,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(19,163,255,.025) 1px,transparent 1px);background-size:55px 55px;z-index:0;pointer-events:none}
  /* Card hover lift */
  .video-card,.stat-card{transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s!important}
  .video-card:hover{transform:translateY(-6px) scale(1.01)!important;box-shadow:0 20px 50px rgba(0,0,0,.4)!important}
  .stat-card:hover{transform:translateY(-4px)!important}
  /* Button glow pulse */
  @keyframes btnPulse{0%,100%{box-shadow:0 4px 20px rgba(19,163,255,.3)}50%{box-shadow:0 4px 30px rgba(19,163,255,.55)}}
  .watch-btn,.test-btn,.complete-btn.ready{animation:btnPulse 2.5s ease-in-out infinite}
  /* Nav logo bigger */
  .nav-logo{font-size:1.6rem!important}

</style>
</head>
<body>
<div class="bg-blob b1"></div><div class="bg-blob b2"></div><div class="bg-grid"></div>
<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="container">
  <div class="logo" style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:2rem"><img src="/vs4u_logo.png" alt="Logo" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(245,158,11,0.45);box-shadow:0 0 20px rgba(245,158,11,0.3)"><div><span class="v-u">V</span><span class="stand">stand4</span><span class="v-u">U</span></div></div>
  <div class="card">
    <div class="admin-badge">Admin Access</div>
    <h1>Admin Login</h1>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Password">
    </div>
    <button onclick="login()">Login as Admin →</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
const dot = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx+'px'; dot.style.top = my+'px'; });
function animRing() { rx += (mx-rx)*0.14; ry += (my-ry)*0.14; ring.style.left = rx+'px'; ring.style.top = ry+'px'; requestAnimationFrame(animRing); }
animRing();
document.querySelectorAll('a,button,input').forEach(el => {
  el.addEventListener('mouseenter', () => ring.classList.add('hover'));
  el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
});
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const r = document.createElement('span'); r.className = 'ripple';
    const rect = this.getBoundingClientRect(); const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(r); setTimeout(() => r.remove(), 600);
  });
});
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const res = await fetch("/admin-login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
  const data = await res.json();
  if (data.success) { window.location.href = "/admin-dashboard.html"; }
  else { const msg = document.getElementById("msg"); msg.textContent = data.message; msg.style.display = "block"; }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>

  <div class="footer-brand"><span class="v-u">V</span><span class="stand">stand4</span><span class="v-u">U</span> Technologies</div>
  <div class="footer-info"><span>📍 2nd & 3rd Floor, MTR Complex, 3968/3, Outer Ring Rd, Kasturi Nagar, Bengaluru, KA 560043</span></div>

    <span>✉️ <a href="mailto:info@vstand4utechnologies.com">info@vstand4utechnologies.com</a></span>

    <span class="footer-sep">|</span>
    <span>🛠 Support: <a href="tel:9353669364">9353669364</a></span>
  </div>
  <div class="footer-copy">© 2024 Vstand4U Technologies. All rights reserved.</div>
</footer>
</body>
</html>
